<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DinoX – Under Construction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 2rem;
        }
        .github-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #238636;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .github-link:hover {
            background: #2ea043;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚧</div>
        <h1>DinoX</h1>
        <p class="subtitle">Website under construction.<br>In the meantime, find us on GitHub:</p>
        <a class="github-link" href="https://github.com/rallep71/dinox">github.com/rallep71/dinox</a>
    </div>
</body>
</html>
