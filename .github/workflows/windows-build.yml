name: Windows Build (MSYS2)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with the built artifact'
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-vala
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-libgee
            mingw-w64-x86_64-libsoup3
            mingw-w64-x86_64-sqlcipher
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-json-glib
            mingw-w64-x86_64-libgcrypt
            mingw-w64-x86_64-gpgme
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-libsrtp
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-libsecret
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad
            mingw-w64-x86_64-gst-libav
            mingw-w64-x86_64-libnice
            mingw-w64-x86_64-opus
            mingw-w64-x86_64-openh264
            mingw-w64-x86_64-libvpx
            mingw-w64-x86_64-protobuf-c
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-librsvg
            mingw-w64-x86_64-mosquitto
            mingw-w64-x86_64-tor
            mingw-w64-x86_64-go

      # lyrebird (Tor pluggable transport: obfs4 + WebTunnel) — not in MSYS2
      - name: Build lyrebird
        run: |
          echo "=== Building lyrebird ==="
          cd /tmp
          LYREBIRD_VER=0.8.1
          LYREBIRD_TAG="lyrebird-${LYREBIRD_VER}"
          LYREBIRD_URL="https://gitlab.torproject.org/api/v4/projects/417/repository/archive.tar.gz?sha=${LYREBIRD_TAG}"
          LYREBIRD_FILE="lyrebird-${LYREBIRD_VER}.tar.gz"

          for attempt in 1 2 3; do
            echo "Download attempt ${attempt}/3 ..."
            curl -fSL --retry 3 --retry-delay 5 -o "${LYREBIRD_FILE}" "${LYREBIRD_URL}"
            if file "${LYREBIRD_FILE}" | grep -qi 'gzip'; then
              echo "✓ Valid gzip archive"
              break
            fi
            echo "⚠ Downloaded file is not a valid gzip archive (attempt ${attempt})"
            rm -f "${LYREBIRD_FILE}"
            if [[ ${attempt} -eq 3 ]]; then
              echo "✗ All download attempts failed"
              exit 1
            fi
            sleep 10
          done

          tar xf "${LYREBIRD_FILE}"
          cd lyrebird-${LYREBIRD_TAG}-*
          CGO_ENABLED=0 go build -trimpath -ldflags '-s -w' -o lyrebird.exe ./cmd/lyrebird
          cp lyrebird.exe /mingw64/bin/
          echo "✓ lyrebird installed"

      # webrtc-audio-processing v2.1 — MSYS2 only has v1.x, build v2.1 from source
      - name: Build webrtc-audio-processing v2.1
        run: |
          echo "=== Building webrtc-audio-processing v2.1 ==="
          cd /tmp
          WEBRTC_VER=2.1
          curl -fSL --retry 3 -o "webrtc-audio-processing-${WEBRTC_VER}.tar.gz" \
            "https://github.com/rallep71/dinox/releases/download/vendor-deps/webrtc-audio-processing-${WEBRTC_VER}.tar.gz"
          tar xf "webrtc-audio-processing-${WEBRTC_VER}.tar.gz"
          cd "webrtc-audio-processing-${WEBRTC_VER}"
          # Fix for GCC 13+: some headers use uint8_t/int64_t without including <cstdint>
          for f in webrtc/rtc_base/trace_event.h \
                   webrtc/modules/audio_processing/aec3/multi_channel_content_detector.h; do
              if ! grep -q '#include <cstdint>' "$f" 2>/dev/null; then
                  echo "Patching $f: adding #include <cstdint> for GCC 13+ compatibility..."
                  sed -i '1s|^|#include <cstdint>\n|' "$f"
              fi
          done
          # Fix for abseil-cpp >= 20250814: removed deprecated Nullability template aliases
          ABSEIL_VER=$(pkg-config --modversion absl_base 2>/dev/null || echo "0")
          if [[ "$ABSEIL_VER" > "20250813" ]] && [ -f "${GITHUB_WORKSPACE}/scripts/patches/webrtc-audio-processing-v2.1-remove-abseil-nullability.patch" ]; then
              echo "Detected abseil-cpp $ABSEIL_VER >= 20250814, applying nullability patch..."
              patch -p1 < "${GITHUB_WORKSPACE}/scripts/patches/webrtc-audio-processing-v2.1-remove-abseil-nullability.patch"
          fi
          meson setup build --prefix=/mingw64
          ninja -C build
          ninja -C build install
          echo "✓ webrtc-audio-processing v2.1 installed"
          pkg-config --modversion webrtc-audio-processing-2

      # libomemo-c is not in MSYS2 repos — build from source
      - name: Build libomemo-c
        run: |
          echo "=== Building libomemo-c ==="
          cd /tmp
          git clone --depth 1 https://github.com/rallep71/libomemo-c.git
          cd libomemo-c
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX=/mingw64 \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            ..
          ninja
          ninja install
          echo "✓ libomemo-c installed"
          # Verify pkg-config finds it
          pkg-config --modversion libomemo-c

      # Problem matchers for CI error reporting
      - name: Setup problem matchers
        shell: bash
        run: |
          echo "::add-matcher::.github/matchers/gcc-problem-matcher.json"
          echo "::add-matcher::.github/matchers/vala-problem-matcher.json"
          echo "::add-matcher::.github/matchers/meson-problem-matcher.json"

      - name: Generate Windows icon (.ico)
        run: |
          echo "=== Generating dinox.ico from PNGs ==="
          # ImageMagick's convert is available in MSYS2
          pacman -S --noconfirm --needed mingw-w64-x86_64-imagemagick 2>/dev/null || true
          magick \
            main/data/icons/hicolor/16x16/apps/im.github.rallep71.DinoX.png \
            main/data/icons/hicolor/32x32/apps/im.github.rallep71.DinoX.png \
            main/data/icons/hicolor/48x48/apps/im.github.rallep71.DinoX.png \
            main/data/icons/hicolor/128x128/apps/im.github.rallep71.DinoX.png \
            main/data/icons/hicolor/256x256/apps/im.github.rallep71.DinoX.png \
            main/data/dinox.ico
          echo "✓ dinox.ico created ($(wc -c < main/data/dinox.ico) bytes)"

      - name: Configure (meson setup)
        run: |
          meson setup build \
            -Dplugin-omemo=enabled \
            -Dplugin-rtp=enabled \
            -Dplugin-openpgp=enabled \
            -Dplugin-ice=enabled \
            -Dplugin-http-files=enabled
          echo ""
          echo "=== Configuration Summary ==="
          grep -A 20 "Dino 0" build/meson-logs/meson-log.txt | head -25 || true

      - name: Build
        run: |
          ninja -C build
          echo "✓ Build successful"

      - name: Create distribution bundle
        run: |
          ./scripts/update_dist.sh
          echo ""
          echo "=== Distribution Contents ==="
          find dist -type f | head -30 || true
          echo "..."
          echo "Total files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"

      - name: Verify distribution
        run: |
          echo "=== Verifying distribution ==="
          # Check critical files exist
          MISSING=0
          for f in dist/dinox.exe dist/dinox.bat dist/libdino-0.dll dist/libxmpp-vala-0.dll; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            else
              echo "  ✓ $f"
            fi
          done
          # Check plugins
          PLUGIN_COUNT=$(find dist/plugins -name "*.dll" 2>/dev/null | wc -l)
          echo "  ✓ $PLUGIN_COUNT plugins found"
          if [ "$PLUGIN_COUNT" -lt 4 ]; then
            echo "WARNING: Expected at least 4 plugins!"
            MISSING=1
          fi
          # Check DLLs
          DLL_COUNT=$(find dist -maxdepth 1 -name "*.dll" | wc -l)
          echo "  ✓ $DLL_COUNT system DLLs"
          if [ "$MISSING" -eq 1 ]; then
            echo "ERROR: Distribution verification failed!"
            exit 1
          fi
          echo "=== Distribution OK ==="

      - name: Get version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: DinoX-Windows-${{ steps.version.outputs.version }}-x86_64
          path: dist/
          retention-days: 30

      # Create GitHub Release when a version tag is pushed or manually triggered
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        shell: bash
        run: |
          cd dist && 7z a -tzip "../DinoX-Windows-${{ steps.version.outputs.version }}-x86_64.zip" . && cd ..
          echo "Created: DinoX-Windows-${{ steps.version.outputs.version }}-x86_64.zip"
          sha256sum DinoX-Windows-${{ steps.version.outputs.version }}-x86_64.zip > DinoX-Windows-${{ steps.version.outputs.version }}-x86_64.zip.sha256
          echo "=== SHA256 Checksum ==="
          cat DinoX-Windows-${{ steps.version.outputs.version }}-x86_64.zip.sha256

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DinoX-Windows-*.zip
            DinoX-Windows-*.zip.sha256
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
